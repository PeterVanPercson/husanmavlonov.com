<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Husan Mavlonov</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#16181c" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #16181c; --fg: #e8e6df; --dim: #7c7873; --accent: #a8aeb4;
      --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      --sans: 'Inter', system-ui, -apple-system, sans-serif;
      --serif: 'Instrument Serif', Georgia, serif;
    }
    html, body {
      background: var(--bg); color: var(--fg);
      font-family: var(--sans);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    main {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; padding: 40px; text-align: center;
    }
    .code {
      font-family: var(--mono); font-size: 12px;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--accent);
    }
    h1 {
      font-family: var(--serif); font-weight: 400;
      font-size: clamp(40px, 9vw, 84px);
      line-height: 1; letter-spacing: -0.02em;
    }
    h1 em { color: var(--accent); font-style: normal; }
    p {
      font-family: var(--serif); font-size: clamp(18px, 2.6vw, 24px);
      color: var(--dim); max-width: 30ch;
    }
    a.home {
      margin-top: 10px;
      font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--dim); text-decoration: none;
      border-bottom: 1px solid currentColor;
      padding-bottom: 3px;
      transition: color 0.2s ease;
    }
    a.home:hover { color: var(--fg); }
  </style>
</head>
<body>
  <main>
    <span class="code">404 · not found</span>
    <h1>Husan Mavlonov<em>.</em></h1>
    <p>lost the thread. nothing lives at this address.</p>
    <a class="home" href="/">← back to start</a>
  </main>
</body>
</html>
